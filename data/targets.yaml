  - name: ivabradine_hcn4
    category: control
    drug:
      name: Ivabradine
      kind: smiles
      value: "CN(CCCN1CCC2=CC(=C(C=C2CC1=O)OC)OC)CC3CC4=CC(=C(C=C34)OC)OC"
      pubchem_cid: 132999
    target:
      name: HCN4
      uniprot: Q9Y3Q4
      # Using pore/transmembrane domain region (residues 260-590) for docking feasibility
      # Full protein is 1203 aa — too large for efficient ligand docking on Colab
      sequence: >-
        KDENTTPWIVFNVVSDTFFLIDLVLNFRTGIVVEDNTEIILDPQRIKMKYLKSWFMVDFISSIPVDYIFL
        IVETRIDSEVYKTARALRIVRFTKILSLLRLLRLSRLIRYIHQWEEIFHMTYDLASAVVRIVNLIGMMLL
        LCHWDGCLQFLVPMLQDFPDDCWVSINNMVNNSWGKQYSYALFKAMSHMLCIGYGRQAPVGMSDVWLTM
        LSMIVGATCYAMFIGHATALIQSLDSSRRQYQEKYKQVEQYMSFHKLPPDTRQRIHDYYEHRYQGKMFDE
        ESILGELSEPLREEIINFNCRKLVASMPLFANADPNFVTSMLTKLRFEVFQPGDY
      residue_range: "260-590"
    reference_pdb: "8OFI"
    rmsd_target: 2.0
    biology: >-
      Open-channel blocker of the HCN4 funny current (If). Reduces SA node firing rate,
      lowering resting HR without affecting contractility. In endurance context: lower resting
      HR → increased diastolic filling → greater stroke volume adaptation.

